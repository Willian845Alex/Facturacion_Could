services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: facturacion_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    networks:
      - facturacion_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: facturacion_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - facturacion_net

  db:
    image: postgres:16-alpine
    container_name: facturacion_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: facturacion
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - facturacion_net

  redis:
    image: redis:7-alpine
    container_name: facturacion_redis
    restart: unless-stopped
    networks:
      - facturacion_net

volumes:
  postgres_data:

networks:
  facturacion_net:
    driver: bridge
